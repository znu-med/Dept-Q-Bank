<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    ============================================================
    DEPT. Q. BANK — index.html
    ============================================================
    HOW TO CHANGE SITE TITLE: Edit the <title> tag below AND
    update "siteTitle" in config/modules.json.

    HOW TO CHANGE FAVICON: Replace the emoji in the <link rel="icon">
    tag with any emoji or swap it for an actual .ico file.

    HOW TO CHANGE COLORS: Edit assets/css/styles.css :root {}

    DEPLOYMENT: Push to GitHub and enable GitHub Pages on the
    main branch. No build step required.
    ============================================================
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO & Social -->
  <title>Dept. Q. Bank</title>
  <meta name="description" content="Professional medical question bank for anatomy, physiology, biochemistry, and histology." />
  <meta name="theme-color" content="#1B3A6B" />

  <!-- Open Graph -->
  <meta property="og:title"       content="Dept. Q. Bank" />
  <meta property="og:description" content="Professional medical question bank platform." />
  <meta property="og:type"        content="website" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <link rel="apple-touch-icon" href="assets/images/favicon.png" />

  <!-- Theme: apply before render to prevent flash -->
  <script>
    (function() {
      var t = localStorage.getItem('dqb_theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/styles.css" />

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!--
    ┌─────────────────────────────────────────────────────┐
    │  Application Root                                   │
    │  All content is injected here by JavaScript.        │
    │  Do not add content inside this div directly.       │
    └─────────────────────────────────────────────────────┘
  -->
  <div id="app" role="main" aria-label="Dept. Q. Bank Application">
    <!-- Initial loading state (shown before JS runs) -->
    <div class="loading-screen">
      <div class="spinner"></div>
      <p class="loading-screen__text">Loading Dept. Q. Bank…</p>
    </div>
  </div>

  <!--
    ============================================================
    Scripts — loaded in dependency order
    1. storage.js  — LocalStorage persistence layer
    2. exam.js     — Exam engine (question loading, scoring)
    3. ui.js       — UI rendering helpers
    4. app.js      — Main application controller (loads last)
    ============================================================
  -->
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/exam.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
